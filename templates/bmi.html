<!DOCTYPE html>
<html>
<head>
<title>BMI Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen flex items-center justify-center">

<div class="bg-white/10 backdrop-blur-xl p-8 rounded-2xl border border-cyan-500/20 w-96">

<h2 class="text-2xl text-cyan-400 mb-6 text-center">
⚖ BMI Calculator
</h2>

<form method="POST">

<input type="number" name="weight" placeholder="Weight (kg)"
class="w-full p-3 mb-4 rounded bg-black/40 border border-cyan-400">

<input type="number" name="height" placeholder="Height (cm)"
class="w-full p-3 mb-4 rounded bg-black/40 border border-cyan-400">

<button class="w-full bg-cyan-500 hover:bg-cyan-400 p-3 rounded font-bold">
Calculate BMI
</button>

</form>

{% if bmi %}
<div class="mt-6 text-center">

<p class="text-xl text-cyan-300">Your BMI</p>

<p class="text-3xl font-bold text-green-400">
{{ bmi }}
</p>

<p class="text-gray-300 mt-2">
{{ category }}
</p>

</div>
{% endif %}

</div>

</body>
</html>
