<!DOCTYPE html>
<html>
<head>
    <title>HealthGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<nav class="bg-blue-600 text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">HealthGenie</h1>

    {% if session.get("user_id") %}
    <div class="space-x-4">
        <a href="{{ url_for('dashboard') }}" class="hover:underline">Dashboard</a>
        <a href="{{ url_for('chat') }}" class="hover:underline">AI Chat</a>
       {% if session.get("is_admin") == 1 %}
<a href="{{ url_for('admin_panel') }}">Admin Panel</a>
{% endif %}
        <a href="{{ url_for('logout') }}" class="hover:underline">Logout</a>
    </div>
    {% endif %}
</nav>

<div class="max-w-4xl mx-auto mt-10 bg-white p-8 rounded-xl shadow-md">
    {% block content %}{% endblock %}
</div>

<style>
body {
    opacity: 0;
    transition: opacity 0.4s ease-in-out;
}
body.loaded {
    opacity: 1;
}
</style>

<script>
window.addEventListener("load", function() {
    document.body.classList.add("loaded");
});
</script>

</body>
</html>
