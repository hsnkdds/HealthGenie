<!DOCTYPE html>
<html>
<head>
<title>HealthGenie Report</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen flex items-center justify-center">

<div class="bg-white/10 backdrop-blur-xl p-8 rounded-2xl border border-cyan-500/20 w-[500px]">

<h2 class="text-2xl text-cyan-400 mb-6 text-center">
🧾 AI Medical Report
</h2>

<form method="POST">

<textarea
name="symptoms"
placeholder="Describe your symptoms (fever, cough, headache...)"
class="w-full p-3 mb-4 rounded bg-black/40 border border-cyan-400 h-28"
></textarea>

<button class="w-full bg-cyan-500 hover:bg-cyan-400 p-3 rounded font-bold">
Generate AI Report
</button>

</form>

{% if report %}

<div class="mt-6 text-center border-t border-cyan-400/30 pt-5">

<p class="text-xl text-cyan-300 mb-2">
AI Diagnosis
</p>

<p class="text-green-400 text-lg font-semibold whitespace-pre-line">
{{ report }}
</p>

</div>

{% endif %}

</div>

</body>
</html>
