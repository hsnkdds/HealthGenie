{% extends "base.html" %}

{% block content %}

<h2>Admin Panel</h2>

<h3>All Users</h3>

<table border="1" cellpadding="8">
    <tr>
        <th>User ID</th>
        <th>Username</th>
        <th>Total Chats</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.total_chats }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
