<!DOCTYPE html>
<html>
<head>
    <title>Register - HealthGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">
        Create Account
    </h2>

    <form method="POST" class="space-y-4">

<input type="text" name="username" placeholder="Username"
class="w-full p-3 border rounded-lg" required>

<input type="password" name="password" placeholder="Password"
class="w-full p-3 border rounded-lg" required>

<input type="number" name="age" placeholder="Age"
class="w-full p-3 border rounded-lg" required>

<select name="gender" class="w-full p-3 border rounded-lg" required>
<option value="">Select Gender</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
</select>

<button type="submit"
class="w-full bg-blue-600 text-white py-2 rounded-lg">
Register
</button>

</form>

    <p class="mt-4 text-center">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-blue-600 font-semibold">
            Login
        </a>
    </p>
</div>


<style>
body {
    opacity: 0;
    transition: opacity 0.4s ease-in-out;
}
body.loaded {
    opacity: 1;
}
</style>

<script>
window.addEventListener("load", function() {
    document.body.classList.add("loaded");
});
</script>

</body>
</html>
