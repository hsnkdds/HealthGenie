<!DOCTYPE html>
<html>
<head>
<title>User Profile</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen flex items-center justify-center">

<div class="bg-white/10 backdrop-blur-lg p-10 rounded-2xl border border-cyan-500/30 w-96">

<h2 class="text-2xl font-bold text-cyan-400 mb-6 text-center">
👤 User Profile
</h2>

<div class="space-y-4">

<div class="bg-white/5 p-4 rounded-lg">
<strong>Username:</strong>
<p>{{ user["username"] }}</p>
</div>

<div class="bg-white/5 p-4 rounded-lg">
<strong>Age:</strong>
<p>{{ user["age"] }}</p>
</div>

<div class="bg-white/5 p-4 rounded-lg">
<strong>Gender:</strong>
<p>{{ user["gender"] }}</p>
</div>

</div>

<a href="/dashboard"
class="block mt-6 text-center bg-cyan-500 hover:bg-cyan-600 py-2 rounded-lg">
Back to Dashboard
</a>

</div>

</body>
</html>
